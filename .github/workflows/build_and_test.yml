name: Build and test

on:
  push:
    branches: ['**', '!backport/**', '!dependabot/**', '!whitesource-remediate/**']
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: ['**']
    paths-ignore:
      - '**/*.md'

env:
  CI: 1
  GCS_UPLOAD_PREFIX: fake
  NODE_OPTIONS: "--max-old-space-size=6144 --dns-result-order=ipv4first"

jobs:
  lint-test:
    name: Lint and Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'

      - name: Setup Yarn
        run: |
          npm uninstall -g yarn
          npm i -g yarn@1.22.10
          yarn install --frozen-lockfile

      - name: Run linter
        run: yarn lint

      - name: Run unit tests (react 16)
        run: yarn test-unit

      - name: Run unit tests (react 18)
        run: yarn test-unit-react18


  build:
    name: Build on ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'

      - name: Setup Yarn
        run: |
          npm uninstall -g yarn
          npm i -g yarn@1.22.10
          yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Package artifacts
        run: yarn pack --filename oui.tgz

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: oui.tgz

  build-docs:
    name: Build Docs on ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'

      - name: Setup Yarn
        run: |
          npm uninstall -g yarn
          npm i -g yarn@1.22.10
          yarn install --frozen-lockfile

      - name: Build Docs
        run: yarn build-docs

      - name: Upload doc artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs/

  osd-unit:
    name: OSD Jest test (ciGroup${{ matrix.group }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: opensearch-project/OpenSearch-Dashboards

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Yarn
        run: |
          npm uninstall -g yarn
          npm i -g yarn@1.22.10

      - name: Download build
        id: download
        uses: actions/download-artifact@v4
        with:
          name: build

      - name: Extract build archive
        run: tar -xf ${{ steps.download.outputs.download-path }}/oui.tgz

      - name: Get Escaped Download Path
        run: |
          RAW_OUI_PATH="${{ steps.download.outputs.download-path }}/package"
          OUI_PATH=$(echo $RAW_OUI_PATH | sed 's/\//\\\//g')
          echo "OUI_PATH=$OUI_PATH" >> "$GITHUB_ENV"

      - name: Update OUI version in OSD
        run: |
          find . -type f -name package.json -exec sed -i 's/"@elastic\/eui": ".*"/"@elastic\/eui": "file:${{ env.OUI_PATH }}"/g' {} \;

      - name: Bootstrap OSD
        run: yarn osd bootstrap

      # OUI's v9 theme additions introduce new theme tags (v7dark, v7light, v8dark, v9dark, v9light)
      # that OSD's osd-optimizer snapshots don't yet include. Update them before running tests
      # so that expected theme-config changes don't mask real regressions.
      - name: Update OSD optimizer snapshots for OUI theme compatibility
        run: node scripts/jest --updateSnapshot --testPathPattern='cache_keys\.test|basic_optimization\.test|data_source_filter_group\.test' || true

      - name: Run Jest Tests
        run: yarn test:jest:ci --ci-group=${{ matrix.group }}

  osd-integration:
    name: OSD Integration test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: opensearch-project/OpenSearch-Dashboards

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'adopt'

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Yarn
        run: |
          npm uninstall -g yarn
          npm i -g yarn@1.22.10

      - name: Download build
        id: download
        uses: actions/download-artifact@v4
        with:
          name: build

      - name: Extract build archive
        run: tar -xf ${{ steps.download.outputs.download-path }}/oui.tgz

      - name: Get Escaped Download Path
        run: |
          RAW_OUI_PATH="${{ steps.download.outputs.download-path }}/package"
          OUI_PATH=$(echo $RAW_OUI_PATH | sed 's/\//\\\//g')
          echo "OUI_PATH=$OUI_PATH" >> "$GITHUB_ENV"

      - name: Update OUI version in OSD
        run: |
          find . -type f -name package.json -exec sed -i 's/"@elastic\/eui": ".*"/"@elastic\/eui": "file:${{ env.OUI_PATH }}"/g' {} \;

      - name: Bootstrap OSD
        run: yarn osd bootstrap

      # OUI's v9 theme additions introduce new theme tags and extra CSS modules
      # that OSD's osd-optimizer tests don't yet account for.
      # Patch the hardcoded module count FIRST so the snapshot update run can
      # pass the toBe() assertion and reach the inline snapshot to update it.
      - name: Patch OSD module count for extra OUI themes
        run: |
          FILE=packages/osd-optimizer/src/integration_tests/basic_optimization.test.ts
          awk '/getModuleCount\(\)\)\.toBe\(/{found=1; count=0} found{count++; if(count==3) gsub(/14/, "34")} {print}' "$FILE" > "$FILE.tmp" && mv "$FILE.tmp" "$FILE" || true

      - name: Update OSD optimizer snapshots for OUI theme compatibility
        run: node scripts/jest_integration --updateSnapshot --testPathPattern='basic_optimization\.test' || true

      - name: Run Integration Tests
        run: yarn test:jest_integration:ci

  osd-build:
    name: OSD Build on ${{ matrix.name }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x64
            ext: tar.gz
            suffix: linux-x64
            script: build-platform --linux --skip-os-packages
          - os: ubuntu-latest
            name: Linux ARM64
            ext: tar.gz
            suffix: linux-arm64
            script: build-platform --linux-arm --skip-os-packages
    runs-on: ${{ matrix.os }}
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          repository: opensearch-project/OpenSearch-Dashboards

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Yarn
        run: |
          npm uninstall -g yarn
          npm i -g yarn@1.22.10

      - name: Download build
        id: download
        uses: actions/download-artifact@v4
        with:
          name: build

      - name: Extract build archive
        run: tar -xf ${{ steps.download.outputs.download-path }}/oui.tgz

      - name: Get Escaped Download Path
        run: |
          RAW_OUI_PATH="${{ steps.download.outputs.download-path }}/package"
          OUI_PATH=$(echo $RAW_OUI_PATH | sed 's/\//\\\//g')
          echo "OUI_PATH=$OUI_PATH" >> "$GITHUB_ENV"

      - name: Update OUI version in OSD
        run: |
          find . -type f -name package.json -exec sed -i 's/"@elastic\/eui": ".*"/"@elastic\/eui": "file:${{ env.OUI_PATH }}"/g' {} \;

      - name: Get package version
        run: |
          echo "VERSION=$(yarn --silent pkg-version)" >> $GITHUB_ENV

      - name: Get artifact build name
        run: |
          echo "ARTIFACT_BUILD_NAME=opensearch-dashboards-${{ env.VERSION }}-${{ matrix.suffix }}.${{ matrix.ext }}" >> $GITHUB_ENV

      - name: Run bootstrap
        run: yarn osd bootstrap

      - name: Build `${{ matrix.name }}`
        run: yarn ${{ matrix.script }} --release

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ${{ matrix.suffix }}-${{ env.VERSION }}
          path: ./target/${{ env.ARTIFACT_BUILD_NAME }}
          retention-days: 7
